apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: flux-image-updates
  namespace: flux-system
spec:
  interval: 30m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: fluxbot
        email: fluxbot@users.noreply.github.com
      messageTemplate: 'chore: auto-update image to {{ .Images }}'
    push:
      branch: main
  update:
    path: ./clusters
    strategy: Setters
