name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: echo "Tests passed"

  build-and-scan:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  promote-dev:
    runs-on: ubuntu-latest
    needs: [build-and-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - name: Decrypt SOPS secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          for f in $(find clusters/prod -name '*.enc.yaml' 2>/dev/null); do
            sops --decrypt "$f" > "${f%.enc.yaml}.yaml"
          done || true
      - name: Update dev manifest
        run: |
          sed -i "s|tag: latest|tag: ${{ github.sha }}|" clusters/dev/deployment.yaml
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add clusters/dev/
          git commit -m "chore: promote image ${{ github.sha }} to dev" || true
          git push

  promote-staging:
    runs-on: ubuntu-latest
    needs: [promote-dev]
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Update staging manifest
        run: |
          sed -i "s|tag: .*|tag: ${{ github.sha }}|" clusters/staging/deployment.yaml
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add clusters/staging/
          git commit -m "chore: promote image ${{ github.sha }} to staging" || true
          git push

  promote-prod:
    runs-on: ubuntu-latest
    needs: [promote-staging]
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - name: Update prod manifest
        run: |
          sed -i "s|tag: .*|tag: ${{ github.sha }}|" clusters/prod/deployment.yaml
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add clusters/prod/
          git commit -m "chore: promote image ${{ github.sha }} to prod" || true
          git push
