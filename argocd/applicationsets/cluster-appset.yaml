apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-apps
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: dev
            namespace: dev
            path: clusters/dev
          - env: staging
            namespace: staging
            path: clusters/staging
          - env: prod
            namespace: prod
            path: clusters/prod
  template:
    metadata:
      name: '{{env}}-cluster'
    spec:
      project: '{{env}}'
      source:
        repoURL: 'https://github.com/myorg/gitops-pipeline-template'
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
